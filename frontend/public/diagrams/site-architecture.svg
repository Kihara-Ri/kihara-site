  <text x="728" y="514" fill="#334155" font-size="18" font-family="Arial, sans-serif">sticky TOC + themed styles</text>

  <rect x="1010" y="170" width="110" height="368" rx="22" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
