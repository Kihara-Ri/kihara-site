  <rect x="80" y="598" width="860" height="78" rx="20" fill="#0F172A"/>
  <text x="110" y="645" fill="#E2E8F0" font-size="22" font-family="Arial, sans-serif" font-weight="700">Core idea</text>
  <text x="248" y="645" fill="#CBD5E1" font-size="20" font-family="Arial, sans-serif">The backend owns content truth; the frontend owns reading experience.</text>

