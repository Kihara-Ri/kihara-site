  <text x="728" y="275" fill="#334155" font-size="18" font-family="Arial, sans-serif">/api/overview /api/tags</text>

  <rect x="80" y="382" width="240" height="156" rx="22" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="108" y="424" fill="#6D28D9" font-size="24" font-family="Arial, sans-serif" font-weight="700">Frontend Data</text>
  <text x="108" y="460" fill="#334155" font-size="18" font-family="Arial, sans-serif">blogApi.ts</text>
  <text x="108" y="487" fill="#334155" font-size="18" font-family="Arial, sans-serif">fetch article / overview</text>
  <text x="108" y="514" fill="#334155" font-size="18" font-family="Arial, sans-serif">route orchestration</text>

  <rect x="390" y="382" width="240" height="156" rx="22" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="2"/>
  <text x="418" y="424" fill="#4338CA" font-size="24" font-family="Arial, sans-serif" font-weight="700">Markdown Pipeline</text>
