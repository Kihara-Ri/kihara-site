<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="32" fill="#F8FAFC"/>
  <rect x="36" y="36" width="1128" height="688" rx="28" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="2"/>

  <text x="80" y="92" fill="#0F172A" font-size="34" font-family="Arial, sans-serif" font-weight="700">Kihara Site Architecture</text>
  <text x="80" y="126" fill="#64748B" font-size="18" font-family="Arial, sans-serif">content source → backend indexing → API transport → frontend rendering → interactive reading experience</text>

  <rect x="80" y="170" width="240" height="128" rx="22" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="108" y="212" fill="#1D4ED8" font-size="24" font-family="Arial, sans-serif" font-weight="700">Content Source</text>
  <text x="108" y="248" fill="#334155" font-size="18" font-family="Arial, sans-serif">Markdown articles</text>
  <text x="108" y="275" fill="#334155" font-size="18" font-family="Arial, sans-serif">tag_config.yaml</text>

  <rect x="390" y="170" width="240" height="128" rx="22" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
  <text x="418" y="212" fill="#15803D" font-size="24" font-family="Arial, sans-serif" font-weight="700">Go Backend</text>
  <text x="418" y="248" fill="#334155" font-size="18" font-family="Arial, sans-serif">scan / validate / sort</text>
  <text x="418" y="275" fill="#334155" font-size="18" font-family="Arial, sans-serif">overview / article store</text>

  <rect x="700" y="170" width="240" height="128" rx="22" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
