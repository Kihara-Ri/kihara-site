  <text x="418" y="487" fill="#334155" font-size="18" font-family="Arial, sans-serif">highlight.js + KaTeX</text>
  <text x="418" y="514" fill="#334155" font-size="18" font-family="Arial, sans-serif">custom plugins + headings env</text>

  <rect x="700" y="382" width="240" height="156" rx="22" fill="#F0FDFA" stroke="#5EEAD4" stroke-width="2"/>
  <text x="728" y="424" fill="#0F766E" font-size="24" font-family="Arial, sans-serif" font-weight="700">Presentation</text>
